name: Run AMCAF Compliance Simulation

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run (SC-01 through SC-06, or ALL)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - SC-01
          - SC-02
          - SC-03
          - SC-04
          - SC-05
          - SC-06
      output_format:
        description: 'Output format'
        required: true
        default: 'json'
        type: choice
        options:
          - json
          - console

jobs:
  simulate:
    name: AMCAF Compliance Validation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run AMCAF simulation
        run: |
          echo "=================================================="
          echo "  AMCAF v1.0 — Compliance Simulation"
          echo "  Scenario : ${{ github.event.inputs.scenario }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "=================================================="
          python src/engine/amcaf.py \
            --scenario ${{ github.event.inputs.scenario }} \
            --format json

      - name: Write run metadata
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime

          meta = {
            "last_run": datetime.utcnow().isoformat() + "Z",
            "triggered_by": "${{ github.actor }}",
            "scenario": "${{ github.event.inputs.scenario }}",
            "run_number": ${{ github.run_number }},
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          os.makedirs("results", exist_ok=True)
          with open("results/meta.json", "w") as f:
            json.dump(meta, f, indent=2)
          print("Metadata written to results/meta.json")
          EOF

      - name: Commit results to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "chore: update results from workflow run #${{ github.run_number }} (${{ github.event.inputs.scenario }})"
          git push