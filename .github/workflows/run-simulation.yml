name: Run AMCAF Compliance Simulation

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - SC-01
          - SC-02
          - SC-03
          - SC-04
          - SC-05
          - SC-06
          - CUSTOM

      # ── CUSTOM SCENARIO TOGGLES ──────────────────────────────────────
      # Only used when scenario = CUSTOM. Each toggle introduces a
      # specific misconfiguration into the synthetic configuration.

      iam_wildcard:
        description: '[CUSTOM] AWS — IAM wildcard policy (triggers IAM-01 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      mfa_disabled_azure:
        description: '[CUSTOM] Azure — MFA Conditional Access disabled (triggers IAM-02 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      dormant_accounts_aws:
        description: '[CUSTOM] AWS — Include dormant IAM users (triggers IAM-03 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      s3_encryption_disabled:
        description: '[CUSTOM] AWS — S3 bucket encryption disabled (triggers ENC-01 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      weak_tls_azure:
        description: '[CUSTOM] Azure — Storage account TLS set to 1.0 (triggers ENC-02 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      logging_disabled:
        description: '[CUSTOM] ALL providers — Audit logging disabled (triggers LOG-01 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      log_retention_low:
        description: '[CUSTOM] AWS + Azure — Log retention below minimum (triggers LOG-02 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      open_ssh_aws:
        description: '[CUSTOM] AWS — Security group open SSH 0.0.0.0/0 (triggers NET-01 + NET-03 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      public_bucket_gcp:
        description: '[CUSTOM] GCP — Cloud Storage bucket public access (triggers NET-01 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

      permissive_firewall_gcp:
        description: '[CUSTOM] GCP — VPC firewall allows all inbound (triggers NET-03 FAIL)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

jobs:
  simulate:
    name: AMCAF Compliance Validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build custom scenario config
        if: github.event.inputs.scenario == 'CUSTOM'
        run: |
          python - <<'EOF'
          import json, os

          iam_wildcard          = "${{ github.event.inputs.iam_wildcard }}"          == "true"
          mfa_disabled_azure    = "${{ github.event.inputs.mfa_disabled_azure }}"    == "true"
          dormant_accounts_aws  = "${{ github.event.inputs.dormant_accounts_aws }}"  == "true"
          s3_enc_disabled       = "${{ github.event.inputs.s3_encryption_disabled }}" == "true"
          weak_tls_azure        = "${{ github.event.inputs.weak_tls_azure }}"         == "true"
          logging_disabled      = "${{ github.event.inputs.logging_disabled }}"       == "true"
          log_retention_low     = "${{ github.event.inputs.log_retention_low }}"      == "true"
          open_ssh_aws          = "${{ github.event.inputs.open_ssh_aws }}"           == "true"
          public_bucket_gcp     = "${{ github.event.inputs.public_bucket_gcp }}"      == "true"
          permissive_fw_gcp     = "${{ github.event.inputs.permissive_firewall_gcp }}" == "true"

          # build description from active toggles
          active = []
          if iam_wildcard:         active.append("IAM wildcard (AWS)")
          if mfa_disabled_azure:   active.append("MFA disabled (Azure)")
          if dormant_accounts_aws: active.append("Dormant accounts (AWS)")
          if s3_enc_disabled:      active.append("S3 encryption disabled (AWS)")
          if weak_tls_azure:       active.append("Weak TLS (Azure)")
          if logging_disabled:     active.append("Logging disabled (all)")
          if log_retention_low:    active.append("Low log retention (AWS, Azure)")
          if open_ssh_aws:         active.append("Open SSH (AWS)")
          if public_bucket_gcp:    active.append("Public bucket (GCP)")
          if permissive_fw_gcp:    active.append("Permissive firewall (GCP)")

          desc = "Custom: " + (", ".join(active) if active else "all controls compliant")

          users = [
            {"username": "ops-user",   "mfa_enabled": True, "last_used_days": 5},
            {"username": "admin-user", "mfa_enabled": True, "last_used_days": 12},
          ]
          if dormant_accounts_aws:
            users.append({"username": "svc-legacy",   "mfa_enabled": True, "last_used_days": 142})
            users.append({"username": "audit-reader", "mfa_enabled": True, "last_used_days": None})

          sgs = []
          if open_ssh_aws:
            sgs.append({
              "group_id": "sg-custom",
              "inbound_rules": [
                {"cidr": "0.0.0.0/0", "port": 22,  "protocol": "tcp"},
                {"cidr": "10.0.0.0/8","port": 443, "protocol": "tcp"},
              ]
            })

          config = {
            "scenario_id": "SC-CUSTOM",
            "description": desc,
            "expected_outcome": "Depends on selected toggles",
            "key_controls_tested": ["IAM-01","IAM-02","IAM-03","ENC-01","ENC-02","LOG-01","LOG-02","NET-01","NET-03"],
            "aws": {
              "iam": {
                "policies": [{"name": "AdminPolicy" if iam_wildcard else "ReadOnlyPolicy",
                              "actions": ["*"] if iam_wildcard else ["s3:GetObject"]}],
                "users": users,
              },
              "s3": {"buckets": [{"name": "prod-data", "default_encryption_enabled": not s3_enc_disabled}]},
              "cloudtrail": {
                "trails": [{"name": "mgmt-trail", "is_logging": not logging_disabled}],
                "log_file_validation_enabled": True,
                "s3_object_lock_enabled": not log_retention_low,
                "retention_days": 180 if log_retention_low else 365,
              },
              "ec2": {"security_groups": sgs},
            },
            "azure": {
              "conditional_access": {"mfa_policy_enabled": not mfa_disabled_azure},
              "storage_accounts": [{"name": "prodstore01",
                                    "minimum_tls_version": "TLS1_0" if weak_tls_azure else "TLS1_2"}],
              "diagnostic_settings": {
                "activity_log_enabled": not logging_disabled,
                "log_retention_days": 60 if log_retention_low else 90,
                "immutable_storage_enabled": True,
              },
            },
            "gcp": {
              "cloud_storage": {"buckets": [{
                "name": "gs-prod",
                "public_access_prevention": "unspecified" if public_bucket_gcp else "enforced",
                "uniform_bucket_level_access": not public_bucket_gcp,
              }]},
              "audit_logs": {"admin_activity_enabled": not logging_disabled},
              "iam": {"service_accounts": [{"name": "svc-dataflow@proj.iam", "last_used_days": 10}]},
              "vpc": {"firewall_rules": ([{
                "name": "allow-all-inbound",
                "source_ranges": ["0.0.0.0/0"],
                "action": "allow",
                "ports": ["all"],
              }] if permissive_fw_gcp else [])},
            },
          }

          os.makedirs("configs", exist_ok=True)
          with open("configs/scenario-custom.json", "w") as f:
            json.dump(config, f, indent=2)
          print(f"Custom scenario written: {desc}")
          EOF

      - name: Run AMCAF simulation
        run: |
          echo "=================================================="
          echo "  AMCAF v1.0 — Compliance Simulation"
          echo "  Scenario : ${{ github.event.inputs.scenario }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "=================================================="
          python src/engine/amcaf.py \
            --scenario ${{ github.event.inputs.scenario }} \
            --format json

      - name: Write run metadata and history
        run: |
          python - <<'EOF'
          import json, os, glob
          from datetime import datetime

          ts         = datetime.utcnow().isoformat() + "Z"
          run_number = ${{ github.run_number }}
          scenario   = "${{ github.event.inputs.scenario }}"
          actor      = "${{ github.actor }}"
          run_url    = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          os.makedirs("results/history", exist_ok=True)

          meta = {
            "last_run": ts, "triggered_by": actor,
            "scenario": scenario, "run_number": run_number, "run_url": run_url
          }
          with open("results/meta.json", "w") as f:
            json.dump(meta, f, indent=2)

          snapshot = []
          for sc in ["sc-01","sc-02","sc-03","sc-04","sc-05","sc-06","sc-custom"]:
            path = f"results/{sc}.json"
            if os.path.exists(path):
              with open(path) as f:
                snapshot.append(json.load(f))

          total  = sum(d["report_metadata"]["total_checks"] for d in snapshot)
          passed = sum(d["report_metadata"]["passed"]       for d in snapshot)
          failed = sum(d["report_metadata"]["failed"]       for d in snapshot)
          rate   = f"{round((passed/total)*100,1)}%" if total else "0%"

          history_entry = {
            "run_number": run_number, "timestamp": ts,
            "triggered_by": actor, "scenario": scenario, "run_url": run_url,
            "summary": {"total_checks": total, "passed": passed, "failed": failed, "compliance_rate": rate},
            "scenarios": snapshot
          }

          ts_safe   = ts.replace(":", "").replace(".", "")
          hist_path = f"results/history/run-{run_number:04d}-{ts_safe}.json"
          with open(hist_path, "w") as f:
            json.dump(history_entry, f, indent=2)

          entries = []
          for p in sorted(glob.glob("results/history/run-*.json"), reverse=True):
            with open(p) as f:
              d = json.load(f)
            entries.append({
              "run_number": d["run_number"], "timestamp": d["timestamp"],
              "triggered_by": d["triggered_by"], "scenario": d["scenario"],
              "run_url": d["run_url"], "file": os.path.basename(p),
              "summary": d["summary"]
            })
          with open("results/history/index.json", "w") as f:
            json.dump(entries, f, indent=2)
          print(f"History updated — {len(entries)} runs recorded")
          EOF

      - name: Commit results to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ configs/scenario-custom.json || true
          git diff --staged --quiet || git commit -m "chore: results from run #${{ github.run_number }} (${{ github.event.inputs.scenario }})"
          git push