name: Run AMCAF Compliance Simulation

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run (SC-01 through SC-06, or ALL)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - SC-01
          - SC-02
          - SC-03
          - SC-04
          - SC-05
          - SC-06
      output_format:
        description: 'Output format'
        required: true
        default: 'console'
        type: choice
        options:
          - console
          - json

jobs:
  simulate:
    name: AMCAF Compliance Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run AMCAF simulation
        run: |
          echo "=================================================="
          echo "  AMCAF v1.0 — Compliance Simulation"
          echo "  Scenario : ${{ github.event.inputs.scenario }}"
          echo "  Format   : ${{ github.event.inputs.output_format }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "=================================================="
          python src/engine/amcaf.py --scenario ${{ github.event.inputs.scenario }} --format ${{ github.event.inputs.output_format }}

      - name: Upload results as artifact
        if: github.event.inputs.output_format == 'json'
        uses: actions/upload-artifact@v4
        with:
          name: amcaf-results-${{ github.event.inputs.scenario }}-${{ github.run_number }}
          path: results/
          retention-days: 30

